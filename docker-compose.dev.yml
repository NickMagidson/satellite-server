services:
  api:
    build:
      target: dev
    command: npm --workspace apps/api run dev
    environment:
      NODE_ENV: development
    ports:
      - "${PRISMA_STUDIO_PORT:-5555}:5555"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    stdin_open: true
    tty: true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: npm --workspace apps/frontend run dev -- --host 0.0.0.0
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_CESIUM_ION_ACCESS_TOKEN: ${VITE_CESIUM_ION_ACCESS_TOKEN:-}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  node-modules:
